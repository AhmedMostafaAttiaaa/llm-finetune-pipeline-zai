# Mistral-7B-Instruct-v0.3
# Efficient general-purpose model with strong coding ability
model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"
  short_name: "mistral-7b"
  size_billions: 7
  family: "mistral"
  type: "instruct"
  context_length: 32768
  trust_remote_code: false

vram:
  base_model_fp16: "~14 GB"
  qlora_4bit_inference: "~5 GB"
  qlora_4bit_training: "~16-18 GB"
  lora_fp16_training: "~28-30 GB"

recommended:
  for_coding: true
  for_fintech: true
  for_reasoning: true
  notes: "Battle-tested 7B model. Great efficiency and speed. Strong coding + general reasoning. Sliding window attention for long context. Good choice for production deployments."

chat_template: "mistral"

lora:
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  rank: 64
  alpha: 128
  dropout: 0.05

training:
  max_seq_length: 4096
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  num_train_epochs: 3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  max_grad_norm: 1.0
