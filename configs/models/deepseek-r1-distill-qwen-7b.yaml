# DeepSeek-R1-Distill-Qwen-7B
# Reasoning specialist - distilled from DeepSeek-R1 for chain-of-thought
model:
  name: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
  short_name: "deepseek-r1-qwen-7b"
  size_billions: 7
  family: "deepseek-r1"
  type: "instruct"
  context_length: 131072
  trust_remote_code: true

vram:
  base_model_fp16: "~14 GB"
  qlora_4bit_inference: "~5 GB"
  qlora_4bit_training: "~16-20 GB"
  lora_fp16_training: "~28-30 GB"

recommended:
  for_coding: true
  for_fintech: true
  for_reasoning: true
  notes: "REASONING CHAMPION. Distilled from DeepSeek-R1 with built-in chain-of-thought. Excels at multi-step reasoning, self-reflection, and complex problem solving. Outputs <think/> blocks naturally. PERFECT for 'fine-tune reasoning and thinking' requirement."

chat_template: "deepseek"

lora:
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  rank: 64
  alpha: 128
  dropout: 0.05

training:
  max_seq_length: 4096
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.5e-4
  num_train_epochs: 3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  max_grad_norm: 1.0
