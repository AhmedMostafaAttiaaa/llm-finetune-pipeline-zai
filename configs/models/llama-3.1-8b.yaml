# Meta Llama-3.1-8B-Instruct
# Meta's flagship 8B model - strong all-rounder
model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  short_name: "llama-3.1-8b"
  size_billions: 8
  family: "llama3"
  type: "instruct"
  context_length: 131072
  trust_remote_code: false

vram:
  base_model_fp16: "~16 GB"
  qlora_4bit_inference: "~5.5 GB"
  qlora_4bit_training: "~18-20 GB"
  lora_fp16_training: "~30-32 GB"  # Tight fit!

recommended:
  for_coding: true
  for_fintech: true
  for_reasoning: true
  notes: "Strong all-around model. Excellent reasoning and instruction following. Use QLoRA 4-bit only for 30GB VRAM. One of the best general-purpose 8B models."

chat_template: "llama3"

lora:
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  rank: 64
  alpha: 128
  dropout: 0.05

training:
  max_seq_length: 4096
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.5e-4
  num_train_epochs: 3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  max_grad_norm: 1.0
